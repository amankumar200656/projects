<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .quiz-container {
            width: 90%;
            max-width: 600px;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        .question {
            margin-bottom: 20px;
        }

        .question h2 {
            font-size: 20px;
            margin-bottom: 15px;
        }

        .option {
            display: block;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            cursor: pointer;
        }

        .option:hover {
            background: #f0f0f0;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            background: #007bff;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        .btn:hover {
            background: #0056b3;
        }

        #result {
            margin-top: 20px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="quiz-container">

        <h1>JavaScript Quiz</h1>

        <form id="quizForm">

            <div class="question">
                <h2>1. Which keyword is used to declare a variable?</h2>

                <label class="option">
                    <input type="radio" name="q1" value="a">
                    print
                </label>

                <label class="option">
                    <input type="radio" name="q1" value="b">
                    var
                </label>

                <label class="option">
                    <input type="radio" name="q1" value="c">
                    echo
                </label>

                <label class="option">
                    <input type="radio" name="q1" value="d">
                    define
                </label>
            </div>

            <div class="question">
                <h2>2. Which method selects an element by ID?</h2>

                <label class="option">
                    <input type="radio" name="q2" value="a">
                    getElementById()
                </label>

                <label class="option">
                    <input type="radio" name="q2" value="b">
                    queryElement()
                </label>

                <label class="option">
                    <input type="radio" name="q2" value="c">
                    findElement()
                </label>

                <label class="option">
                    <input type="radio" name="q2" value="d">
                    selectById()
                </label>
            </div>

            <div class="question">
                <h2>3. Which event occurs when a button is clicked?</h2>

                <label class="option">
                    <input type="radio" name="q3" value="a">
                    onload
                </label>

                <label class="option">
                    <input type="radio" name="q3" value="b">
                    onclick
                </label>

                <label class="option">
                    <input type="radio" name="q3" value="c">
                    onhover
                </label>

                <label class="option">
                    <input type="radio" name="q3" value="d">
                    onsubmit
                </label>
            </div>

            <button type="submit" class="btn">
                Submit Quiz
            </button>

        </form>

        <div id="result"></div>

    </div>
    <script src="quiz.js"></script>
</body>

</html>
